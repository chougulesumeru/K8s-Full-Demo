# deployment.yml
# - Deployment manages replication and rolling updates of pods

apiVersion: apps/v1
kind: Deployment
metadata:
   name: nginx-deployment
   namespace: demo-ns
spec:
   replicas: 2
   selector:
      matchLabels:
         app: demo-ns
   template:
      metadata:
         labels:
            app: demo-ns
      spec:
         containers:
            - name: nginx-container
              image: nginx:latest
              ports:
                 - containerPort: 80
              resources:
                 requests:
                    cpu: "100m"
                    memory: "128Mi"
                 limits:
                    cpu: "200m"
                    memory: "256Mi"
